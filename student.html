<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>抽籤系統</title>
</head>
<body>

<h2>報告題目抽籤</h2>

<input id="name" placeholder="姓名"><br><br>

<select id="topic">
  <option value="A">題目A</option>
  <option value="B">題目B</option>
</select><br><br>

<button onclick="submitData()">送出</button>

<p id="msg"></p>
<p id="info"></p>

<script>
const API = "https://script.google.com/macros/s/AKfycbxRRvvLnMt-rDzlPIgEJc678p7D18XoxdzjBhvqIy6CO3-mXPqKDpUPSLYa2P6fH0mj/exec";

function getDeviceId() {
  let id = localStorage.getItem("deviceId");
  if (!id) {
    id = "dev-" + Math.random().toString(36).substr(2, 9);
    localStorage.setItem("deviceId", id);
  }
  return id;
}

function submitData() {
  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      name: document.getElementById("name").value,
      topic: document.getElementById("topic").value,
      deviceId: getDeviceId()
    })
  })
  .then(res => res.text())
  .then(res => {
    if (res === "duplicate") msg("你已填過");
    else if (res === "locked") msg("已開獎，無法填寫");
    else msg("送出成功！");
  });
}

function msg(t){document.getElementById("msg").innerText=t;}

function refresh() {
  fetch(API)
    .then(res => res.json())
    .then(data => {
      if (data.status === "waiting") {
        document.getElementById("info").innerText =
          "目前人數：" + JSON.stringify(data.count);
      } else {
        let html = "<h3>🎉 開獎結果</h3>";
        data.result.forEach(r=>{
          html += `題目${r[0]}：<br>✅ ${r[1]}<br>❌ ${r[2]}<br><br>`;
        });
        document.getElementById("info").innerHTML = html;
      }
    });
}

setInterval(refresh, 3000);
</script>

</body>
</html>
