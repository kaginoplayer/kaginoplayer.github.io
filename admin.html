<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>老師後台</title>
</head>
<body>

<h2>🧑‍🏫 控制台</h2>

<input type="password" id="pwd" placeholder="密碼"><br><br>

<button onclick="draw()">🎰 開獎</button>
<button onclick="reset()">♻️ 重置</button>

<p id="msg"></p>

<script>
const API = "https://script.google.com/macros/s/AKfycbxRRvvLnMt-rDzlPIgEJc678p7D18XoxdzjBhvqIy6CO3-mXPqKDpUPSLYa2P6fH0mj/exec";

function draw() {
  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "draw",
      password: document.getElementById("pwd").value
    })
  })
  .then(res => res.text())
  .then(res => {
    if (res === "wrong_pwd") msg("密碼錯誤");
    else if (res === "already_drawn") msg("已經抽過");
    else msg("🎉 開獎完成！");
  });
}

function reset() {
  if (!confirm("⚠️ 確定重置？")) return;
  if (!confirm("🔥 真的要清空所有結果？")) return;

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "reset",
      password: document.getElementById("pwd").value
    })
  })
  .then(res => res.text())
  .then(res => {
    msg("♻️ 已重置！");
  });
}

function msg(t){
  document.getElementById("msg").innerText = t;
}
</script>

</body>
</html>
